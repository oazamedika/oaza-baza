<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Корисници — ПУСЗ Оаза Портал</title>
  <link rel="stylesheet" href="shared.css"/>
  <script src="auth-guard.js"></script>
  <style>
    .badge{display:inline-block;padding:0.2rem 0.65rem;border-radius:20px;font-size:0.72rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}
    .badge-draft{background:#f0ece2;color:#8a7a55}.badge-social{background:#e8f0e8;color:#3a6e3a}.badge-doctor{background:#e8ecf5;color:#2e4a8a}.badge-completed{background:#e6f0e6;color:#2a6e2a;border:1px solid #b5d5b5}
    .clients-table{width:100%;border-collapse:collapse;font-size:0.88rem}
    .clients-table th{text-align:left;font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--gray);padding:0.75rem 1rem;border-bottom:2px solid var(--border)}
    .clients-table td{padding:0.85rem 1rem;border-bottom:1px solid var(--border);color:var(--dark);vertical-align:middle}
    .clients-table tr:last-child td{border-bottom:none}.clients-table tr:hover td{background:#faf7f2}
    .btn-new-client{display:inline-flex;align-items:center;gap:0.5rem;padding:0.65rem 1.25rem;background:var(--dark);color:#fff;border:none;border-radius:5px;font-family:'Lato',sans-serif;font-size:0.82rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.15s}
    .btn-new-client:hover{background:var(--olive)}
    .empty-state{text-align:center;padding:4rem 2rem;color:var(--gray)}.empty-state svg{opacity:0.25;margin-bottom:1rem}
    .client-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;background:var(--cream2);border:2px solid var(--border)}
    .client-avatar-placeholder{width:34px;height:34px;border-radius:50%;background:var(--olive);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:0.85rem;font-weight:700}
    .client-cell{display:flex;align-items:center;gap:0.75rem}
    .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(47,42,36,0.55);z-index:100;align-items:center;justify-content:center;padding:1rem}
    .modal-backdrop.open{display:flex}
    .modal{background:#fff;border-radius:10px;width:100%;max-width:720px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);display:flex;flex-direction:column}
    .modal-header{padding:1.5rem 1.75rem 1rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:2}
    .modal-header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem}
    .modal-title{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:600;color:var(--dark)}
    .modal-close{background:none;border:none;cursor:pointer;color:var(--gray);padding:0.25rem;display:flex;align-items:center;transition:color 0.15s}.modal-close:hover{color:var(--dark)}
    .step-indicator{display:flex;gap:0}
    .step{display:flex;align-items:center;gap:0.5rem;flex:1}
    .step:not(:last-child)::after{content:'';flex:1;height:2px;background:var(--border);margin:0 0.5rem;transition:background 0.2s}
    .step.done:not(:last-child)::after{background:var(--olive)}
    .step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;background:var(--border);color:var(--gray);flex-shrink:0;transition:background 0.2s,color 0.2s}
    .step.active .step-num{background:var(--dark);color:#fff}.step.done .step-num{background:var(--olive);color:#fff}
    .step-label{font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--gray);white-space:nowrap}
    .step.active .step-label{color:var(--dark)}.step.done .step-label{color:var(--olive)}
    .modal-body{padding:1.5rem 1.75rem;flex:1}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem 1.25rem}.form-grid .full{grid-column:1/-1}
    .form-group{display:flex;flex-direction:column}
    .form-label{font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--gray);margin-bottom:0.4rem}
    .form-label .req{color:#c0392b;margin-left:2px}
    .form-input,.form-select{padding:0.7rem 0.85rem;border:1px solid var(--border);border-radius:4px;font-family:'Lato',sans-serif;font-size:0.9rem;color:var(--dark);background:#fff;outline:none;transition:border-color 0.15s,box-shadow 0.15s}
    .form-input:focus,.form-select:focus{border-color:var(--olive);box-shadow:0 0 0 3px rgba(122,122,46,0.1)}
    .form-input.error{border-color:#c0392b}
    .form-section{margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border)}
    .form-section-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;color:var(--dark);margin-bottom:0.2rem}
    .form-section-sub{font-size:0.8rem;color:var(--gray);margin-bottom:1rem}
    .pic-upload-wrap{display:flex;align-items:center;gap:1.25rem}
    .pic-preview{width:72px;height:72px;border-radius:50%;object-fit:cover;background:var(--cream2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--gray);overflow:hidden;flex-shrink:0}
    .pic-preview img{width:100%;height:100%;object-fit:cover}
    .btn-upload-pic{display:inline-flex;align-items:center;gap:0.4rem;padding:0.5rem 0.9rem;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--gray);font-family:'Lato',sans-serif;font-size:0.82rem;cursor:pointer;transition:border-color 0.15s,color 0.15s}
    .btn-upload-pic:hover{border-color:var(--dark);color:var(--dark)}
    .srodstvo-item{background:var(--cream);border:1px solid var(--border);border-radius:6px;padding:1rem;margin-bottom:0.75rem;position:relative}
    .srodstvo-item-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem}
    .srodstvo-remove{position:absolute;top:0.6rem;right:0.6rem;background:none;border:none;cursor:pointer;color:var(--gray);font-size:1.1rem;padding:0.2rem 0.4rem;border-radius:3px;transition:background 0.15s,color 0.15s}
    .srodstvo-remove:hover{background:#fdf0ef;color:#c0392b}
    .btn-add-srodstvo{display:inline-flex;align-items:center;gap:0.4rem;padding:0.5rem 0.9rem;background:transparent;border:1px dashed var(--olive);border-radius:4px;color:var(--olive);font-family:'Lato',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;transition:background 0.15s}
    .btn-add-srodstvo:hover{background:rgba(122,122,46,0.07)}
    .file-drop-zone{border:2px dashed var(--border);border-radius:6px;padding:1.5rem;text-align:center;color:var(--gray);font-size:0.85rem;cursor:pointer;transition:border-color 0.15s,background 0.15s}
    .file-drop-zone:hover{border-color:var(--olive);background:rgba(122,122,46,0.04)}
    .file-list{margin-top:0.75rem;display:flex;flex-direction:column;gap:0.4rem}
    .file-item{display:flex;align-items:center;justify-content:space-between;padding:0.5rem 0.75rem;background:var(--cream);border:1px solid var(--border);border-radius:4px;font-size:0.82rem}
    .file-remove{background:none;border:none;cursor:pointer;color:var(--gray);font-size:1rem;padding:0 0.25rem}.file-remove:hover{color:#c0392b}
    .step-status-card{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:1rem}
    .step-status-header{display:flex;align-items:center;justify-content:space-between;padding:0.85rem 1.1rem;background:var(--cream);border-bottom:1px solid var(--border)}
    .step-status-title{font-weight:700;font-size:0.9rem;color:var(--dark)}
    .step-status-body{padding:1rem 1.1rem;font-size:0.88rem;color:var(--gray);line-height:1.7}
    .step-pending{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;text-align:center;color:var(--gray);gap:0.75rem}
    .step-pending svg{opacity:0.3}.step-pending strong{font-size:1rem;color:var(--dark);font-family:'Playfair Display',serif}.step-pending p{font-size:0.85rem;max-width:360px;line-height:1.7}
    .modal-footer{padding:1rem 1.75rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:1rem;position:sticky;bottom:0;background:#fff}
    .modal-error{font-size:0.82rem;color:#c0392b;flex:1}
    .modal-footer-btns{display:flex;gap:0.75rem}
    .btn-secondary{padding:0.65rem 1.2rem;background:transparent;border:1px solid var(--border);border-radius:4px;font-family:'Lato',sans-serif;font-size:0.85rem;font-weight:700;color:var(--gray);cursor:pointer;transition:border-color 0.15s,color 0.15s}
    .btn-secondary:hover{border-color:var(--dark);color:var(--dark)}
    .btn-primary{padding:0.65rem 1.4rem;background:var(--dark);border:none;border-radius:4px;font-family:'Lato',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:0.08em;color:#fff;cursor:pointer;transition:background 0.15s}
    .btn-primary:hover{background:var(--olive)}.btn-primary:disabled{opacity:0.5;pointer-events:none}
    .link-view{font-size:0.82rem;color:var(--olive);text-decoration:none;font-weight:700}.link-view:hover{text-decoration:underline}
  </style>
</head>
<body>
<div class="app">
  <div id="sidebar-placeholder"></div>
  <main class="main">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
      <div>
        <h1 class="page-title">Корисници</h1>
        <p class="page-subtitle">Евиденција на сите корисници на установата</p>
      </div>
      <div id="new-client-btn-wrap" style="display:none;">
        <button class="btn-new-client" id="btnNewClient">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Нов Корисник
        </button>
      </div>
    </div>
    <div class="page-content">
      <div class="card" style="padding:0;overflow:hidden;">
        <div id="clients-loading" style="padding:3rem;text-align:center;color:var(--gray);font-size:0.9rem;">Се вчитува…</div>
        <div id="clients-table-wrap" style="display:none;">
          <table class="clients-table">
            <thead><tr>
              <th>Корисник</th><th>Кат / Соба / Кревет</th><th>ЕМБГ</th><th>Телефон</th><th>Статус</th><th>Датум</th><th></th>
            </tr></thead>
            <tbody id="clients-tbody"></tbody>
          </table>
        </div>
        <div id="clients-empty" style="display:none;">
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            <p>Сè уште нема регистрирани корисници.</p>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <div class="modal-header-top">
        <h2 class="modal-title">Регистрација на нов корисник</h2>
        <button class="modal-close" id="modalClose">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="step-indicator" id="stepIndicator">
        <div class="step active" data-step="1"><div class="step-num">1</div><span class="step-label">Општи податоци</span></div>
        <div class="step" data-step="2"><div class="step-num">2</div><span class="step-label">Социјален работник</span></div>
        <div class="step" data-step="3"><div class="step-num">3</div><span class="step-label">Доктор</span></div>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <div class="modal-error" id="modalError"></div>
      <div class="modal-footer-btns">
        <button class="btn-secondary" id="btnBack" style="display:none;">Назад</button>
        <button class="btn-primary" id="btnNext">Следно</button>
      </div>
    </div>
  </div>
</div>
<input type="file" id="f_pic_input" accept="image/*" style="display:none"/>
<input type="file" id="f_files_input" multiple style="display:none"/>

<script src="sidebar.js"></script>
<script>
window.addEventListener('DOMContentLoaded',()=>{
  const wait=setInterval(()=>{
    if(window._username!==undefined){clearInterval(wait);buildSidebar('Корисници');initPage();}
  },30);
});

const STATUS_LABEL={
  draft:{text:'Нацрт',cls:'badge-draft'},
  social:{text:'Чека социјален',cls:'badge-social'},
  doctor:{text:'Чека доктор',cls:'badge-doctor'},
  completed:{text:'Завршен прием',cls:'badge-completed'},
};

function formatDate(iso){
  if(!iso)return'—';
  return new Date(iso).toLocaleDateString('mk-MK',{day:'2-digit',month:'2-digit',year:'numeric'});
}

async function loadClients(){
  const{data,error}=await window._sb.from('clients')
    .select('id,ime_prezime,floor_number,room_number,bed_number,embg,telefon,status,created_at,obrakanje,profile_pic_url')
    .order('created_at',{ascending:false});
  document.getElementById('clients-loading').style.display='none';
  if(!data||data.length===0){document.getElementById('clients-empty').style.display='block';return;}
  const tbody=document.getElementById('clients-tbody');
  tbody.innerHTML=data.map(c=>{
    const st=STATUS_LABEL[c.status]||{text:c.status,cls:'badge-draft'};
    const loc=(c.floor_number&&c.room_number&&c.bed_number)?`К${c.floor_number} / С${c.room_number} / Кр${c.bed_number}`:'—';
    const avatar=c.profile_pic_url
      ?`<img class="client-avatar" src="${esc(c.profile_pic_url)}" alt=""/>`
      :`<div class="client-avatar-placeholder">${esc((c.ime_prezime||'?').charAt(0))}</div>`;
    return`<tr>
      <td><div class="client-cell">${avatar}<div><div style="font-weight:700">${esc(c.obrakanje?c.obrakanje+' ':'')}${esc(c.ime_prezime)}</div></div></div></td>
      <td style="font-size:0.82rem">${esc(loc)}</td>
      <td style="font-family:monospace;font-size:0.82rem">${esc(c.embg||'—')}</td>
      <td style="font-size:0.82rem">${esc(c.telefon||'—')}</td>
      <td><span class="badge ${st.cls}">${st.text}</span></td>
      <td style="color:var(--gray);font-size:0.82rem">${formatDate(c.created_at)}</td>
      <td><a href="#" class="link-view">Преглед</a></td>
    </tr>`;
  }).join('');
  document.getElementById('clients-table-wrap').style.display='block';
}

function initPage(){
  if(canManageClients()){
    document.getElementById('new-client-btn-wrap').style.display='';
    document.getElementById('btnNewClient').addEventListener('click',openModal);
  }
  loadClients();
}

function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// ── Modal state ──
let currentStep=1,savedClientId=null,srodstvoItems=[],picFile=null,uploadFiles=[];

function openModal(){
  currentStep=1;savedClientId=null;srodstvoItems=[];picFile=null;uploadFiles=[];
  renderStep();
  document.getElementById('modalBackdrop').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modalBackdrop').classList.remove('open');
  document.body.style.overflow='';
  clearError();loadClients();
}
document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('modalBackdrop').addEventListener('click',e=>{if(e.target===document.getElementById('modalBackdrop'))closeModal();});

function renderStep(){
  updateStepIndicator();clearError();
  const isManager=canManageClients();
  const isSocial=(window._username||'').toLowerCase()==='socijalenrabotnik';
  const isDoctor=(window._username||'').toLowerCase()==='doktor';
  const btnNext=document.getElementById('btnNext');
  const btnBack=document.getElementById('btnBack');
  btnBack.style.display=(currentStep>1&&isManager)?'':'none';

  if(currentStep===1){
    btnNext.textContent='Зачувај и продолжи';btnNext.style.display='';
    document.getElementById('modalBody').innerHTML=renderStep1HTML();
    setupStep1();
  }else if(currentStep===2){
    btnNext.style.display=isManager||isSocial?'':'none';
    btnNext.textContent=isManager?'Продолжи кон доктор →':'Потврди дел 2';
    document.getElementById('modalBody').innerHTML=renderStep2HTML(isSocial);
  }else if(currentStep===3){
    btnNext.style.display=isManager||isDoctor?'':'none';
    btnNext.textContent=isManager?'Заврши прием':'Потврди дел 3';
    document.getElementById('modalBody').innerHTML=renderStep3HTML(isDoctor);
  }
}

function updateStepIndicator(){
  document.querySelectorAll('.step').forEach(el=>{
    const s=parseInt(el.dataset.step);
    el.classList.toggle('active',s===currentStep);
    el.classList.toggle('done',s<currentStep);
  });
}

function renderStep1HTML(){
  return`
  <div style="margin-bottom:1.25rem">
    <div class="form-section-title">Профилна слика</div>
    <div class="form-section-sub">Фотографија на корисникот (опционално)</div>
    <div class="pic-upload-wrap">
      <div class="pic-preview" id="picPreview">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div>
        <button class="btn-upload-pic" type="button" onclick="document.getElementById('f_pic_input').click()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Избери слика
        </button>
        <div style="font-size:0.75rem;color:var(--gray);margin-top:0.4rem">JPG, PNG до 5MB</div>
      </div>
    </div>
  </div>

  <div class="form-section" style="margin-top:0;padding-top:1rem;border-top:1px solid var(--border)">
    <div class="form-section-title">Основни податоци</div>
    <div class="form-grid" style="margin-top:0.75rem">
      <div class="form-group">
        <label class="form-label">Обраќање <span class="req">*</span></label>
        <select class="form-select" id="f_obrakanje"><option value="">— Изберете —</option><option>Г-дин</option><option>Г-ѓа</option><option>Г-ца</option></select>
      </div>
      <div class="form-group">
        <label class="form-label">Број од матична книга <span class="req">*</span></label>
        <input class="form-input" id="f_maticen" type="text" placeholder="нпр. 123456"/>
      </div>
      <div class="form-group full">
        <label class="form-label">Име и Презиме <span class="req">*</span></label>
        <input class="form-input" id="f_ime_prezime" type="text" placeholder="Марија Петровска"/>
      </div>
      <div class="form-group full">
        <label class="form-label">Адреса на живеење <span class="req">*</span></label>
        <input class="form-input" id="f_adresa" type="text" placeholder="ул. Климент Охридски 5, Скопје"/>
      </div>
      <div class="form-group">
        <label class="form-label">ЕМБГ <span class="req">*</span></label>
        <input class="form-input" id="f_embg" type="text" placeholder="0101950450001" maxlength="13"/>
      </div>
      <div class="form-group">
        <label class="form-label">Телефон <span class="req">*</span></label>
        <input class="form-input" id="f_telefon" type="tel" placeholder="+389 70 000 000"/>
      </div>
      <div class="form-group full">
        <label class="form-label">Бр. лична карта / пасош <span class="req">*</span></label>
        <input class="form-input" id="f_lk" type="text" placeholder="нпр. 1234567"/>
      </div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">Сместување <span class="req">*</span></div>
    <div class="form-section-sub">Изберете кат, соба и кревет — слободноста се проверува автоматски.</div>
    <div class="form-grid" style="margin-top:0.75rem">
      <div class="form-group">
        <label class="form-label">Кат <span class="req">*</span></label>
        <select class="form-select" id="f_floor">
          <option value="">— Кат —</option><option value="1">Кат 1</option><option value="2">Кат 2</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Соба <span class="req">*</span></label>
        <select class="form-select" id="f_room">
          <option value="">— Соба —</option>
          <option value="1">Соба 1</option><option value="2">Соба 2</option><option value="3">Соба 3</option>
          <option value="4">Соба 4</option><option value="5">Соба 5</option><option value="6">Соба 6</option>
          <option value="7">Соба 7</option><option value="8">Соба 8</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Кревет <span class="req">*</span></label>
        <select class="form-select" id="f_bed">
          <option value="">— Кревет —</option><option value="1">Кревет 1</option><option value="2">Кревет 2</option>
        </select>
      </div>
      <div class="form-group" style="align-self:flex-end">
        <div id="bed-status" style="font-size:0.8rem;padding:0.5rem 0"></div>
      </div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">Сродство</div>
    <div class="form-section-sub">Лица за контакт / роднини (може да се додадат повеќе)</div>
    <div id="srodstvo-list"></div>
    <button class="btn-add-srodstvo" type="button" id="btnAddSrodstvo">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Додај сродник
    </button>
  </div>

  <div class="form-section">
    <div class="form-section-title">Документи</div>
    <div class="form-section-sub">Прикачете документи (опционално)</div>
    <div class="file-drop-zone" id="fileDropZone" onclick="document.getElementById('f_files_input').click()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:0.5rem;opacity:0.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <div>Кликнете за да изберете датотеки</div>
      <div style="font-size:0.75rem;margin-top:0.25rem">PDF, DOC, JPG, PNG</div>
    </div>
    <div class="file-list" id="file-list"></div>
  </div>`;
}

function setupStep1(){
  document.getElementById('f_pic_input').onchange=function(){
    const file=this.files[0];if(!file)return;picFile=file;
    const r=new FileReader();
    r.onload=e=>{document.getElementById('picPreview').innerHTML=`<img src="${e.target.result}" alt="preview"/>`;};
    r.readAsDataURL(file);
  };
  document.getElementById('f_files_input').onchange=function(){
    uploadFiles=[...uploadFiles,...Array.from(this.files)];renderFileList();this.value='';
  };
  const dz=document.getElementById('fileDropZone');
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.borderColor='var(--olive)';});
  dz.addEventListener('dragleave',()=>{dz.style.borderColor='';});
  dz.addEventListener('drop',e=>{
    e.preventDefault();dz.style.borderColor='';
    uploadFiles=[...uploadFiles,...Array.from(e.dataTransfer.files)];renderFileList();
  });
  ['f_floor','f_room','f_bed'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.addEventListener('change',checkBed);
  });
  renderSrodstvoList();
  document.getElementById('btnAddSrodstvo').addEventListener('click',()=>{
    srodstvoItems.push({ime_prezime:'',adresa:'',telefon:''});renderSrodstvoList();
  });
}

function renderFileList(){
  const list=document.getElementById('file-list');if(!list)return;
  list.innerHTML=uploadFiles.map((f,i)=>`
    <div class="file-item">
      <span class="file-item-name">${esc(f.name)}</span>
      <button class="file-remove" type="button" onclick="removeFile(${i})">×</button>
    </div>`).join('');
}
function removeFile(i){uploadFiles.splice(i,1);renderFileList();}

async function checkBed(){
  const floor=document.getElementById('f_floor')?.value;
  const room=document.getElementById('f_room')?.value;
  const bed=document.getElementById('f_bed')?.value;
  const st=document.getElementById('bed-status');if(!st)return;
  if(!floor||!room||!bed){st.textContent='';return;}
  st.style.color='var(--gray)';st.textContent='Се проверува…';
  const{data}=await window._sb.from('clients').select('id')
    .eq('floor_number',parseInt(floor)).eq('room_number',parseInt(room)).eq('bed_number',parseInt(bed))
    .neq('status','discharged').maybeSingle();
  if(data){st.style.color='#c0392b';st.textContent='⚠ Креветот е зафатен';}
  else{st.style.color='#2a6e2a';st.textContent='✓ Слободен';}
}

function renderSrodstvoList(){
  const list=document.getElementById('srodstvo-list');if(!list)return;
  list.innerHTML=srodstvoItems.map((item,i)=>`
    <div class="srodstvo-item">
      <button class="srodstvo-remove" type="button" onclick="removeSrodstvo(${i})" title="Отстрани">×</button>
      <div class="srodstvo-item-grid">
        <div class="form-group">
          <label class="form-label">Име и Презиме</label>
          <input class="form-input" value="${esc(item.ime_prezime)}" oninput="updateSrodstvo(${i},'ime_prezime',this.value)" placeholder="Петар Петровски"/>
        </div>
        <div class="form-group">
          <label class="form-label">Адреса</label>
          <input class="form-input" value="${esc(item.adresa)}" oninput="updateSrodstvo(${i},'adresa',this.value)" placeholder="Адреса"/>
        </div>
        <div class="form-group">
          <label class="form-label">Телефон</label>
          <input class="form-input" value="${esc(item.telefon)}" oninput="updateSrodstvo(${i},'telefon',this.value)" placeholder="+389 70 000 000"/>
        </div>
      </div>
    </div>`).join('');
}
function updateSrodstvo(i,f,v){srodstvoItems[i][f]=v;}
function removeSrodstvo(i){srodstvoItems.splice(i,1);renderSrodstvoList();}

function renderStep2HTML(canEdit){
  const body=canEdit
    ?`<div class="step-pending"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><strong>Дел 2 — Социјален Работник</strong><p>Полињата за социјалниот работник ќе бидат додадени подоцна. Кликнете „Потврди дел 2" за да продолжи приемот.</p></div>`
    :`<div class="step-pending"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><strong>Дел 2 — Социјален Работник</strong><p>Овој дел го пополнува Социјалниот Работник. Следете го статусот овде.</p></div>`;
  return`<div class="step-status-card"><div class="step-status-header"><span class="step-status-title">Дел 1 — Општи податоци</span><span class="badge badge-completed">Завршен</span></div><div class="step-status-body">Основните информации за корисникот се снимени успешно.</div></div>${body}`;
}

function renderStep3HTML(canEdit){
  const body=canEdit
    ?`<div class="step-pending"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg><strong>Дел 3 — Доктор</strong><p>Полињата за докторот ќе бидат додадени подоцна. Кликнете „Потврди дел 3" за да се заврши приемот.</p></div>`
    :`<div class="step-pending"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg><strong>Дел 3 — Доктор</strong><p>Овој дел го пополнува Докторот. Следете го статусот овде.</p></div>`;
  return`<div class="step-status-card"><div class="step-status-header"><span class="step-status-title">Дел 1 — Општи податоци</span><span class="badge badge-completed">Завршен</span></div><div class="step-status-body">Основните информации се снимени.</div></div><div class="step-status-card"><div class="step-status-header"><span class="step-status-title">Дел 2 — Социјален работник</span><span class="badge badge-completed">Завршен</span></div><div class="step-status-body">Делот за социјалниот работник е потврден.</div></div>${body}`;
}

document.getElementById('btnNext').addEventListener('click',async()=>{
  clearError();
  if(currentStep===1)await saveStep1();
  else if(currentStep===2)await saveStep2();
  else if(currentStep===3)await saveStep3();
});
document.getElementById('btnBack').addEventListener('click',()=>{
  if(currentStep>1&&canManageClients()){currentStep--;renderStep();}
});

async function saveStep1(){
  const required=[
    ['f_obrakanje','Обраќање'],['f_maticen','Број од матична книга'],
    ['f_ime_prezime','Име и Презиме'],['f_adresa','Адреса на живеење'],
    ['f_embg','ЕМБГ'],['f_telefon','Телефон'],['f_lk','Бр. лична карта / пасош'],
    ['f_floor','Кат'],['f_room','Соба'],['f_bed','Кревет'],
  ];
  for(const[id,label]of required){
    const el=document.getElementById(id);
    if(!el||!el.value.trim()){
      el&&el.classList.add('error');
      showError(`Полето „${label}" е задолжително.`);
      el&&el.focus();return;
    }
    el.classList.remove('error');
  }
  const floor=parseInt(document.getElementById('f_floor').value);
  const room=parseInt(document.getElementById('f_room').value);
  const bed=parseInt(document.getElementById('f_bed').value);
  const{data:taken}=await window._sb.from('clients').select('id')
    .eq('floor_number',floor).eq('room_number',room).eq('bed_number',bed)
    .neq('status','discharged').maybeSingle();
  if(taken){showError('Избраниот кревет е веќе зафатен. Изберете друг.');return;}

  document.getElementById('btnNext').disabled=true;
  let profilePicUrl=null;
  if(picFile){
    const ext=picFile.name.split('.').pop();
    const path=`${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
    const{error:upErr}=await window._sb.storage.from('client-photos').upload(path,picFile);
    if(!upErr){
      const{data:urlData}=window._sb.storage.from('client-photos').getPublicUrl(path);
      profilePicUrl=urlData?.publicUrl||null;
    }
  }
  const payload={
    obrakanje:document.getElementById('f_obrakanje').value,
    maticen_broj:document.getElementById('f_maticen').value.trim(),
    ime_prezime:document.getElementById('f_ime_prezime').value.trim(),
    adresa:document.getElementById('f_adresa').value.trim(),
    embg:document.getElementById('f_embg').value.trim(),
    telefon:document.getElementById('f_telefon').value.trim(),
    licna_karta_broj:document.getElementById('f_lk').value.trim(),
    floor_number:floor,room_number:room,bed_number:bed,
    profile_pic_url:profilePicUrl,
    status:'social',created_by:window._user.id,
  };
  const{data,error}=await window._sb.from('clients').insert([payload]).select('id').single();
  document.getElementById('btnNext').disabled=false;
  if(error){
    if(error.code==='23505')showError('Избраниот кревет е веќе зафатен. Изберете друг.');
    else showError('Грешка при зачувување: '+error.message);
    return;
  }
  savedClientId=data.id;
  const srRows=srodstvoItems.filter(s=>s.ime_prezime.trim()).map(s=>({client_id:savedClientId,...s}));
  if(srRows.length>0)await window._sb.from('client_srodstvo').insert(srRows);
  for(const file of uploadFiles){
    const path=`${savedClientId}/${Date.now()}-${file.name}`;
    await window._sb.storage.from('client-files').upload(path,file);
  }
  currentStep=2;renderStep();
}

async function saveStep2(){
  if(savedClientId){
    await window._sb.from('clients').update({status:'doctor',social_completed_at:new Date().toISOString(),social_completed_by:window._user.id}).eq('id',savedClientId);
  }
  currentStep=3;renderStep();
}

async function saveStep3(){
  if(savedClientId){
    await window._sb.from('clients').update({status:'completed',doctor_completed_at:new Date().toISOString(),doctor_completed_by:window._user.id}).eq('id',savedClientId);
  }
  closeModal();
}

function showError(msg){document.getElementById('modalError').textContent=msg;}
function clearError(){document.getElementById('modalError').textContent='';}
</script>
