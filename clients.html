<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Корисници — ПУСЗ Оаза Портал</title>
  <link rel="stylesheet" href="shared.css"/>
  <script src="auth-guard.js"></script>
  <style>
    .badge{display:inline-block;padding:.2rem .65rem;border-radius:20px;font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
    .badge-draft{background:#f0ece2;color:#8a7a55}.badge-doctor{background:#e8ecf5;color:#2e4a8a}.badge-social{background:#e8f0e8;color:#3a6e3a}.badge-completed{background:#e6f0e6;color:#2a6e2a;border:1px solid #b5d5b5}
    .clients-table{width:100%;border-collapse:collapse;font-size:.88rem}
    .clients-table th{text-align:left;font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);padding:.75rem 1rem;border-bottom:2px solid var(--border)}
    .clients-table td{padding:.85rem 1rem;border-bottom:1px solid var(--border);color:var(--dark);vertical-align:middle}
    .clients-table tr:last-child td{border-bottom:none}.clients-table tr:hover td{background:#faf7f2}
    .btn-new{display:inline-flex;align-items:center;gap:.5rem;padding:.65rem 1.25rem;background:var(--dark);color:#fff;border:none;border-radius:5px;font-family:'Lato',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .15s}
    .btn-new:hover{background:var(--olive)}
    .ci-av{width:34px;height:34px;border-radius:50%;background:var(--olive);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:.85rem;font-weight:700;overflow:hidden;flex-shrink:0}
    .ci-av img{width:100%;height:100%;object-fit:cover}
    .ci-cell{display:flex;align-items:center;gap:.75rem}
    .lnk{font-size:.82rem;color:var(--olive);font-weight:700;cursor:pointer;background:none;border:none;padding:0;text-decoration:none}.lnk:hover{text-decoration:underline}
    .empty-state{text-align:center;padding:4rem 2rem;color:var(--gray)}.empty-state svg{opacity:.25;margin-bottom:1rem;display:block;margin-left:auto;margin-right:auto}
  </style>
</head>
<body>
<div class="app">
  <div id="sidebar-placeholder"></div>
  <main class="main">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem">
      <div><h1 class="page-title">Корисници</h1><p class="page-subtitle">Евиденција на сите корисници на установата</p></div>
      <div id="new-btn-wrap" style="display:none">
        <button class="btn-new" id="btnNewClient">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Нов Корисник
        </button>
      </div>
    </div>
    <div class="page-content">
      <div class="card" style="padding:0;overflow:hidden">
        <div id="clients-loading" style="padding:3rem;text-align:center;color:var(--gray)">Се вчитува…</div>
        <div id="clients-table-wrap" style="display:none">
          <table class="clients-table">
            <thead><tr><th>Корисник</th><th>Кат/Соба/Кревет</th><th>ЕМБГ</th><th>Телефон</th><th>Статус</th><th>Датум</th><th></th></tr></thead>
            <tbody id="clients-tbody"></tbody>
          </table>
        </div>
        <div id="clients-empty" style="display:none">
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            <p>Сè уште нема регистрирани корисници.</p>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="sidebar.js"></script>
<script src="admission.js"></script>
<script src="client-card.js"></script>
<script>
const STATUS_LABEL={draft:{t:'Нацрт',c:'badge-draft'},doctor:{t:'Чека доктор',c:'badge-doctor'},social:{t:'Чека социјален',c:'badge-social'},completed:{t:'Завршен прием',c:'badge-completed'}};
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function isDoc(){return(window._username||'').toLowerCase()==='doktor';}
function isSoc(){return(window._username||'').toLowerCase()==='socijalenrabotnik';}

window.addEventListener('DOMContentLoaded',()=>{
  const wait=setInterval(()=>{
    if(window._username!==undefined){clearInterval(wait);buildSidebar('Корисници');initPage();}
  },30);
});

async function loadClients(){
  const{data}=await window._sb.from('clients').select('id,ime_prezime,floor_number,room_number,bed_number,embg,telefon,status,created_at,obrakanje,profile_pic_url').order('created_at',{ascending:false});
  document.getElementById('clients-loading').style.display='none';
  if(!data||!data.length){document.getElementById('clients-empty').style.display='block';return;}
  const tbody=document.getElementById('clients-tbody');
  tbody.innerHTML=data.map(c=>{
    const st=STATUS_LABEL[c.status]||{t:c.status,c:'badge-draft'};
    const loc=(c.floor_number&&c.room_number&&c.bed_number)?`К${c.floor_number}/С${c.room_number}/Кр${c.bed_number}`:'—';
    const avatar=c.profile_pic_url?`<div class="ci-av"><img src="${esc(c.profile_pic_url)}" alt=""/></div>`:`<div class="ci-av">${esc((c.ime_prezime||'?').charAt(0))}</div>`;
    const statusCell=c.status!=='completed'?`<td><span class="badge ${st.c}">${st.t}</span></td>`:'<td></td>';
    // Action buttons based on role
    const actions=[];
    actions.push(`<button class="lnk" onclick="openClientCard('${c.id}')">Преглед</button>`);
    if(canManageClients()&&c.status!=='completed')actions.push(`<button class="lnk" onclick="openAdmissionForClient('${c.id}',loadClients)">Прием</button>`);
    if(isDoc()&&c.status==='doctor')actions.push(`<button class="lnk" onclick="openAdmissionForClient('${c.id}',loadClients)">Заврши</button>`);
    if(isSoc()&&c.status==='social')actions.push(`<button class="lnk" onclick="openAdmissionForClient('${c.id}',loadClients)">Заврши</button>`);
    return`<tr>
      <td><div class="ci-cell">${avatar}<div style="font-weight:700">${esc(c.obrakanje?c.obrakanje+' ':'')}${esc(c.ime_prezime)}</div></div></td>
      <td style="font-size:.82rem">${esc(loc)}</td>
      <td style="font-family:monospace;font-size:.82rem">${esc(c.embg||'—')}</td>
      <td style="font-size:.82rem">${esc(c.telefon||'—')}</td>
      ${statusCell}
      <td style="color:var(--gray);font-size:.82rem">${c.created_at?new Date(c.created_at).toLocaleDateString('mk-MK'):'—'}</td>
      <td style="display:flex;gap:.5rem;align-items:center">${actions.join('')}</td>
    </tr>`;
  }).join('');
  document.getElementById('clients-table-wrap').style.display='block';
}

function initPage(){
  if(canManageClients()){
    document.getElementById('new-btn-wrap').style.display='';
    document.getElementById('btnNewClient').onclick=()=>openNewAdmission(loadClients);
  }
  loadClients();
  // Handle ?edit= param from client-card edit button
  const params=new URLSearchParams(window.location.search);
  if(params.get('edit'))setTimeout(()=>openClientCard(params.get('edit')),500);
}
</script>
</body>
</html>
