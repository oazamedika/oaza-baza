<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Записи — ПУСЗ Оаза Портал</title>
  <link rel="stylesheet" href="shared.css"/>
  <script src="auth-guard.js"></script>
  <style>
    .logs-toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem}
    .date-nav-wrap{display:flex;align-items:center;gap:0.65rem}
    .btn-date-nav{background:none;border:1px solid var(--border);border-radius:4px;padding:0.45rem 0.75rem;cursor:pointer;color:var(--gray);font-size:0.9rem;transition:all 0.15s;line-height:1}
    .btn-date-nav:hover{border-color:var(--dark);color:var(--dark)}
    .date-display{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;color:var(--dark);min-width:200px;text-align:center}
    input[type=date].date-pick{padding:0.42rem 0.65rem;border:1px solid var(--border);border-radius:4px;font-family:'Lato',sans-serif;font-size:0.85rem;color:var(--dark);outline:none;cursor:pointer}
    input[type=date].date-pick:focus{border-color:var(--olive)}
    .btn-new-log{display:inline-flex;align-items:center;gap:0.5rem;padding:0.65rem 1.25rem;background:var(--dark);color:#fff;border:none;border-radius:5px;font-family:'Lato',sans-serif;font-size:0.82rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.15s}
    .btn-new-log:hover{background:var(--olive)}
    .log-feed{display:flex;flex-direction:column;gap:1rem}
    .log-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:1.1rem 1.25rem}
    .lc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.6rem}
    .lc-client{display:flex;align-items:center;gap:0.65rem}
    .lc-av{width:32px;height:32px;border-radius:50%;background:var(--olive);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:0.82rem;font-weight:700;flex-shrink:0;overflow:hidden}
    .lc-av img{width:100%;height:100%;object-fit:cover}
    .lc-cname{font-weight:700;font-size:0.88rem;color:var(--dark)}
    .lc-cmeta{font-size:0.72rem;color:var(--gray)}
    .lc-diag{font-family:monospace;font-size:0.82rem;font-weight:700;color:var(--olive)}
    .lc-type-badge{display:inline-block;padding:0.1rem 0.45rem;border-radius:10px;font-size:0.64rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-left:0.4rem}
    .lt-doctor{background:#e8ecf5;color:#2e4a8a}.lt-social{background:#e8f0e8;color:#3a6e3a}.lt-other{background:#f0ece2;color:#8a7a55}
    .vitals-pills{display:flex;flex-wrap:wrap;gap:0.35rem 0.9rem;padding:0.5rem 0.7rem;background:var(--cream);border-radius:5px;border:1px solid var(--border);margin:0.45rem 0;font-size:0.78rem}
    .vc span{font-weight:700}
    .lc-field{margin-top:0.4rem}
    .lc-fl{font-size:0.64rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray)}
    .lc-fv{font-size:0.84rem;color:var(--dark);line-height:1.55}
    .link-btn{font-size:0.78rem;color:var(--olive);font-weight:700;cursor:pointer;background:none;border:none;padding:0}
    .link-btn:hover{text-decoration:underline}
    .empty-feed{text-align:center;padding:4rem 2rem;color:var(--gray)}
    .empty-feed svg{opacity:0.2;display:block;margin:0 auto 1rem}
  </style>
</head>
<body>
<div class="app">
  <div id="sidebar-placeholder"></div>
  <main class="main">
    <div class="page-header">
      <h1 class="page-title">Записи</h1>
      <p class="page-subtitle">Дневни клинички записи на установата</p>
    </div>
    <div class="page-content">
      <div class="logs-toolbar">
        <div class="date-nav-wrap">
          <button class="btn-date-nav" id="btnPrev">‹</button>
          <span class="date-display" id="dateDisp">—</span>
          <button class="btn-date-nav" id="btnNext">›</button>
          <input type="date" class="date-pick" id="datePick"/>
        </div>
        <button class="btn-new-log" id="btnNewLog">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Нов Запис
        </button>
      </div>
      <div id="log-feed">
        <div class="empty-feed"><p>Се вчитува…</p></div>
      </div>
    </div>
  </main>
</div>

<script src="sidebar.js"></script>
<script src="client-card.js"></script>
<script src="new-log.js"></script>
<script>
let currentDate = new Date();

window.addEventListener('DOMContentLoaded', () => {
  const wait = setInterval(() => {
    if (window._username !== undefined) {
      clearInterval(wait);
      buildSidebar('Записи');
      initPage();
    }
  }, 30);
});

function initPage() {
  const dp = document.getElementById('datePick');
  dp.value = toDateStr(currentDate);
  updateDateDisplay();
  loadFeed();

  document.getElementById('btnPrev').addEventListener('click', () => {
    currentDate.setDate(currentDate.getDate() - 1);
    dp.value = toDateStr(currentDate);
    updateDateDisplay(); loadFeed();
  });
  document.getElementById('btnNext').addEventListener('click', () => {
    currentDate.setDate(currentDate.getDate() + 1);
    dp.value = toDateStr(currentDate);
    updateDateDisplay(); loadFeed();
  });
  dp.addEventListener('change', e => {
    currentDate = new Date(e.target.value + 'T12:00:00');
    updateDateDisplay(); loadFeed();
  });

  // Delegate to new-log.js
  document.getElementById('btnNewLog').addEventListener('click', () => {
    openNewLog(loadFeed);
  });
}

function toDateStr(d) { return d.toISOString().slice(0, 10); }
function dispDate(d)  { return d.toLocaleDateString('mk-MK', { weekday:'long', day:'2-digit', month:'long', year:'numeric' }); }
function updateDateDisplay() { document.getElementById('dateDisp').textContent = dispDate(currentDate); }
function esc(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

const TYPE_LABEL = { doctor:'Доктор', social:'Социјален', fizioterapevt:'Физио', supervisor:'Супервизор', other:'Друго' };
const TYPE_CLS   = { doctor:'lt-doctor', social:'lt-social', fizioterapevt:'lt-other', supervisor:'lt-other', other:'lt-other' };

async function loadFeed() {
  const feed = document.getElementById('log-feed');
  feed.innerHTML = '<div class="empty-feed"><p>Се вчитува…</p></div>';
  const ds = toDateStr(currentDate);
  const { data } = await window._sb.from('client_logs')
    .select('*, clients(id,ime_prezime,obrakanje,profile_pic_url,floor_number,room_number,bed_number)')
    .gte('created_at', ds + 'T00:00:00').lte('created_at', ds + 'T23:59:59')
    .order('created_at', { ascending: false });

  if (!data || !data.length) {
    feed.innerHTML = `<div class="empty-feed"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>Нема записи за ${dispDate(currentDate)}.</p></div>`;
    return;
  }

  feed.innerHTML = `<div class="log-feed">${data.map(l => {
    const c = l.clients || {};
    const loc = c.room_number ? `С${c.room_number}/Кр${c.bed_number}` : '—';
    const av = c.profile_pic_url
      ? `<div class="lc-av"><img src="${esc(c.profile_pic_url)}" alt=""/></div>`
      : `<div class="lc-av">${esc((c.ime_prezime||'?').charAt(0))}</div>`;
    const v = [];
    if(l.kp_sistolicen&&l.kp_dijastolicen) v.push(`КП: <span>${l.kp_sistolicen}/${l.kp_dijastolicen} mmHg</span>`);
    if(l.puls)        v.push(`Пулс: <span>${l.puls} bpm</span>`);
    if(l.temperatura) v.push(`Т°: <span>${l.temperatura}°C</span>`);
    if(l.spo2)        v.push(`SpO2: <span>${l.spo2}%</span>`);
    if(l.respiracii)  v.push(`Респ: <span>${l.respiracii}/мин</span>`);
    if(l.tezina)      v.push(`Тежина: <span>${l.tezina} kg</span>`);
    if(l.seker)       v.push(`Шеќер: <span>${l.seker} mmol/L</span>`);
    if(l.bolka!=null) v.push(`Болка: <span>${l.bolka}/10</span>`);
    return `<div class="log-card">
      <div class="lc-top">
        <div class="lc-client">
          ${av}
          <div>
            <div class="lc-cname">${esc(c.obrakanje?c.obrakanje+' ':'')}${esc(c.ime_prezime||'—')}</div>
            <div class="lc-cmeta">${esc(loc)} · ${new Date(l.created_at).toLocaleTimeString('mk-MK',{hour:'2-digit',minute:'2-digit'})}</div>
          </div>
        </div>
        <button class="link-btn" onclick="openClientCard('${c.id}')">Досие →</button>
      </div>
      <div>
        <span class="lc-diag">${esc(l.dijagnoza_kod||'—')}${l.dijagnoza_opis?' — '+esc(l.dijagnoza_opis):''}</span>
        <span class="lc-type-badge ${TYPE_CLS[l.log_type||'doctor']||'lt-other'}">${TYPE_LABEL[l.log_type||'doctor']||'Друго'}</span>
      </div>
      ${v.length?`<div class="vitals-pills">${v.map(x=>`<div class="vc">${x}</div>`).join('')}</div>`:''}
      ${l.anamneza?`<div class="lc-field"><div class="lc-fl">Анамнеза</div><div class="lc-fv">${esc(l.anamneza)}</div></div>`:''}
      ${l.naod?`<div class="lc-field"><div class="lc-fl">Наод</div><div class="lc-fv">${esc(l.naod)}</div></div>`:''}
      ${l.parenteralna?`<div class="lc-field"><div class="lc-fl">Парентерална</div><div class="lc-fv">${esc(l.parenteralna)}</div></div>`:''}
    </div>`;
  }).join('')}</div>`;
}
</script>
</body>
</html>
