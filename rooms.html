<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Соби — ПУСЗ Оаза Портал</title>
  <link rel="stylesheet" href="shared.css"/>
  <script src="auth-guard.js"></script>
  <style>
    .summary-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem;margin-bottom:2rem}
    .summary-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:1rem 1.25rem}
    .summary-card.hl{border-left:3px solid var(--olive)}
    .sum-lbl{font-size:0.68rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--gray);margin-bottom:0.35rem}
    .sum-val{font-family:'Playfair Display',serif;font-size:2rem;font-weight:600;color:var(--dark);line-height:1}

    .floor-block{margin-bottom:3rem}
    .floor-title{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:600;color:var(--dark);margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:0.75rem}
    .floor-stats{font-family:'Lato',sans-serif;font-size:0.75rem;font-weight:400;color:var(--gray);letter-spacing:0.08em}

    /* Scrollable single row — never wraps */
    .floor-cols-wrap{overflow-x:auto;padding-bottom:0.5rem}
    .floor-cols-wrap::-webkit-scrollbar{height:5px}
    .floor-cols-wrap::-webkit-scrollbar-track{background:var(--cream)}
    .floor-cols-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    .floor-cols{display:flex;flex-wrap:nowrap;gap:0.5rem;align-items:flex-start;width:max-content}

    /* Column pair: top tile + bottom tile, fixed width */
    .col-pair{display:flex;flex-direction:column;gap:0.5rem;flex-shrink:0;width:118px}

    /* Wide pair (floor 1 Дневна only): spans 2 tile widths + gap */
    .col-pair.wide{width:calc(118px * 2 + 0.5rem)}

    /* ── Uniform tile height ──
       Room card = header (~28px) + 2 bed rows (~30px each) = 88px total
       All tiles fixed to this same height. */

    /* Live room card */
    .room-card{background:#fff;border:1px solid var(--border);border-radius:6px;overflow:hidden;
               width:118px;height:88px;display:flex;flex-direction:column}
    .room-hdr{padding:0.3rem 0.6rem;background:var(--cream);border-bottom:1px solid var(--border);flex-shrink:0}
    .room-name{font-size:0.65rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--dark)}
    .bed-list{flex:1;display:flex;flex-direction:column}
    .bed-row{display:flex;align-items:center;gap:0.4rem;padding:0 0.6rem;flex:1;border-bottom:1px solid var(--border)}
    .bed-row:last-child{border-bottom:none}
    .bed-n{font-size:0.65rem;font-weight:700;color:var(--gray);flex-shrink:0;width:11px}
    .bed-occ{font-size:0.72rem;font-weight:700;color:var(--olive);cursor:pointer;
             white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
    .bed-occ:hover{text-decoration:underline}
    .bed-free{font-size:0.7rem;color:var(--border);font-style:italic;flex:1}

    /* Special / inactive tile — same fixed size as room card */
    .special-tile{width:118px;height:88px;border-radius:6px;
                  border:1px dashed var(--border);background:#f5f3ee;
                  display:flex;align-items:center;justify-content:center;
                  padding:0.4rem;box-sizing:border-box}
    .special-tile.wide{width:calc(118px * 2 + 0.5rem)}
    .special-tile.empty{background:transparent;border-color:transparent}
    .sp-text{font-size:0.65rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
             color:var(--gray);text-align:center;line-height:1.4}

    /* Wide-pair bottom row */
    .wide-bot{display:flex;gap:0.5rem}

    .legend{display:flex;gap:1.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
    .legend-item{display:flex;align-items:center;gap:0.5rem;font-size:0.8rem;color:var(--gray)}
    .leg-dot{width:12px;height:12px;border-radius:3px}
    .leg-dot.occ{background:rgba(122,122,46,0.25)}
    .leg-dot.free{background:var(--cream2);border:1px solid var(--border)}
  </style>
</head>
<body>
<div class="app">
  <div id="sidebar-placeholder"></div>
  <main class="main">
    <div class="page-header">
      <h1 class="page-title">Соби</h1>
      <p class="page-subtitle">Преглед на зафатеност на соби и кревети</p>
    </div>
    <div class="page-content">
      <div id="rooms-loading" style="padding:2rem 0;text-align:center;color:var(--gray)">Се вчитува…</div>
      <div id="rooms-content" style="display:none">
        <div class="summary-row" id="summary-row"></div>
        <div class="legend">
          <div class="legend-item"><div class="leg-dot occ"></div>Зафатен</div>
          <div class="legend-item"><div class="leg-dot free"></div>Слободен</div>
        </div>
        <div id="floors-container"></div>
      </div>
    </div>
  </main>
</div>

<script src="sidebar.js"></script>
<script src="client-card.js"></script>
<script>
const TOTAL_BEDS = 84 * 2;
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// ─────────────────────────────────────────────────────────────────
// TILE DEFINITIONS
// rm(n)   = room tile, n = absolute room number
// sp(lbl) = special/inactive tile with label
// em()    = empty transparent placeholder
// ─────────────────────────────────────────────────────────────────
const rm  = n   => ({t:'room',    n});
const sp  = lbl => ({t:'special', lbl});
const em  = ()  => ({t:'empty'});

// ─────────────────────────────────────────────────────────────────
// FLOOR LAYOUTS
// Each floor = array of column-pair objects rendered left→right.
//
// Normal pair:   { top, bot }
//   top and bot are tiles stacked vertically, each 148px wide.
//
// Wide pair:     { wide:true, top, botL, botR }
//   top is a tile spanning full pair width (2×148+gap).
//   botL and botR are two 148px tiles side by side underneath.
//
// Floor 1 (rooms 1–16):
//   [14,13][15,12][16,11][Скали,10][Геронто,9]
//   [Дневна wide / 8 + РаботнаТерапија]
//   [Скали,7][6,1][5,2][4,3]
//
// Floors 2–5 (17 rooms each, starting at s=17/34/51/68):
//   Pattern (using offset n within floor, 1=first room of that floor):
//   [off13,off14][off12,off15][off11,off16][off10,Скали][off9,Геронто]
//   [Дневна wide / Тоалети + off17]
//   [off8,off17] ← wait, off17 already used above
// ─────────────────────────────────────────────────────────────────
// Re-reading floor2 spec: "24-33" is a pair after the Дневна/Тоалети pair.
// 24=off8, 33=off17. Дневна/Тоалети has no room underneath it.
// So: wide pair bottom = [Тоалети, em()]
// Then separate pair [off8, off17] = [24, 33]

function floorLayout(floor) {
  const s = [0,1,17,34,51,68][floor]; // absolute start of this floor's rooms

  if (floor === 1) {
    // rooms 1-16
    return [
      {top:rm(14), bot:rm(13)},
      {top:rm(15), bot:rm(12)},
      {top:rm(16), bot:rm(11)},
      {top:sp('Скали'),              bot:rm(10)},
      {top:sp('Геронто\nДомаќинки'), bot:rm(9) },
      {wide:true, top:sp('Дневна'), botL:rm(8), botR:sp('Работна\nТерапија')},
      {top:sp('Скали'), bot:rm(7)},
      {top:rm(6), bot:rm(1)},
      {top:rm(5), bot:rm(2)},
      {top:rm(4), bot:rm(3)},
    ];
  } else {
    // floors 2-5: 17 rooms, s = first room number
    const o = n => rm(s + n - 1);
    return [
      {top:o(13), bot:o(14)},
      {top:o(12), bot:o(15)},
      {top:o(11), bot:o(16)},
      {top:o(10), bot:sp('Скали')},
      {top:o(9),  bot:sp('Геронто\nДомаќинки')},
      {top:sp('Дневна'), bot:sp('Тоалети')},
      {top:o(8),  bot:o(17)},
      {top:o(7),  bot:sp('Скали')},
      {top:o(6),  bot:o(1)},
      {top:o(5),  bot:o(2)},
      {top:o(4),  bot:o(3)},
    ];
  }
}

// ─────────────────────────────────────────────────────────────────
// HTML RENDERERS
// ─────────────────────────────────────────────────────────────────
function roomCardHtml(num, occupied) {
  let beds = '';
  for (let b = 1; b <= 2; b++) {
    const c = occupied[`${num}-${b}`];
    if (c) {
      beds += `<div class="bed-row"><span class="bed-n">${b}</span><span class="bed-occ" onclick="openClientCard('${esc(c.id)}')">${esc(c.ime_prezime)}</span></div>`;
    } else {
      beds += `<div class="bed-row"><span class="bed-n">${b}</span><span class="bed-free">Слободен</span></div>`;
    }
  }
  return `<div class="room-card"><div class="room-hdr"><span class="room-name">Соба ${num}</span></div><div class="bed-list">${beds}</div></div>`;
}

function specialTileHtml(lbl, wide) {
  const cls = `special-tile${wide?' wide':''}`;
  if (!lbl) return `<div class="${cls} empty"></div>`;
  const txt = lbl.split('\n').map(l=>esc(l)).join('<br>');
  return `<div class="${cls}"><span class="sp-text">${txt}</span></div>`;
}

function tileHtml(tile, occupied, wide) {
  if (!tile || tile.t === 'empty') return `<div class="special-tile${wide?' wide':''} empty"></div>`;
  if (tile.t === 'room')    return roomCardHtml(tile.n, occupied);
  if (tile.t === 'special') return specialTileHtml(tile.lbl, wide);
  return '';
}

function colPairHtml(pair, occupied) {
  if (pair.wide) {
    return `<div class="col-pair wide">
      ${tileHtml(pair.top, occupied, true)}
      <div class="wide-bot">${tileHtml(pair.botL, occupied, false)}${tileHtml(pair.botR, occupied, false)}</div>
    </div>`;
  }
  return `<div class="col-pair">${tileHtml(pair.top, occupied, false)}${tileHtml(pair.bot, occupied, false)}</div>`;
}

// ─────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const wait = setInterval(() => {
    if (window._username !== undefined) { clearInterval(wait); buildSidebar('Соби'); loadRooms(); }
  }, 30);
});

async function loadRooms() {
  const { data } = await window._sb
    .from('clients')
    .select('id,ime_prezime,room_number,bed_number,status')
    .neq('status','discharged')
    .not('room_number','is',null);

  document.getElementById('rooms-loading').style.display = 'none';
  document.getElementById('rooms-content').style.display = 'block';

  const occupied = {};
  (data||[]).forEach(c => { occupied[`${c.room_number}-${c.bed_number}`] = c; });

  const takenCount = Object.keys(occupied).length;
  const freeCount  = TOTAL_BEDS - takenCount;

  document.getElementById('summary-row').innerHTML = `
    <div class="summary-card hl"><div class="sum-lbl">Вкупно кревети</div><div class="sum-val">${TOTAL_BEDS}</div></div>
    <div class="summary-card hl"><div class="sum-lbl">Зафатени</div><div class="sum-val">${takenCount}</div></div>
    <div class="summary-card hl"><div class="sum-lbl">Слободни</div><div class="sum-val">${freeCount}</div></div>
    <div class="summary-card hl"><div class="sum-lbl">Пополнетост</div><div class="sum-val">${TOTAL_BEDS>0?Math.round(takenCount/TOTAL_BEDS*100):0}%</div></div>`;

  let html = '';

  for (let floor = 1; floor <= 5; floor++) {
    const layout = buildFloorLayout(floor, occupied);
    html += layout;
  }

  document.getElementById('floors-container').innerHTML = html;
}

function buildFloorLayout(floor, occupied) {
  const pairs = floorLayout(floor);

  // Collect all room numbers in this floor's layout to count occupancy
  const roomNums = [];
  pairs.forEach(p => {
    [p.top, p.bot, p.botL, p.botR].forEach(t => { if (t && t.t==='room') roomNums.push(t.n); });
  });
  let taken = 0;
  roomNums.forEach(n => { for(let b=1;b<=2;b++){if(occupied[`${n}-${b}`])taken++;} });
  const totalBeds = roomNums.length * 2;

  const colsHtml = pairs.map(p => colPairHtml(p, occupied)).join('');

  return `<div class="floor-block">
    <div class="floor-title">Кат ${floor}<span class="floor-stats">${taken} / ${totalBeds} кревети зафатени</span></div>
    <div class="floor-cols-wrap"><div class="floor-cols">${colsHtml}</div></div>
  </div>`;
}
</script>
</body>
</html>
