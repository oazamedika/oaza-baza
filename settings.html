<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Поставки — ПУСЗ Оаза Портал</title>
  <link rel="stylesheet" href="shared.css"/>
  <script src="auth-guard.js"></script>
</head>
<body>
<div class="app">
  <div id="sidebar-placeholder"></div>
  <main class="main">
    <div class="page-header">
      <h1 class="page-title">Поставки</h1>
      <p class="page-subtitle">Конфигурација и кориснички поставки</p>
    </div>
    <div class="page-content">
      <div class="card">
        <div class="card-title">Поставки</div>
        <p style="font-size:0.9rem;color:var(--gray);line-height:1.75;">Содржината на овој модул ќе биде додадена подоцна.</p>
      </div>
    </div>
  </main>
</div>
<script src="sidebar.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    const wait = setInterval(() => {
      if (window._username !== undefined) { clearInterval(wait); buildSidebar('Поставки'); }
    }, 30);
  });
</script>
</body>
</html>
